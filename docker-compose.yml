version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: citypulse-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: citypulse
      POSTGRES_PASSWORD: citypulse
      POSTGRES_DB: citypulse

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: